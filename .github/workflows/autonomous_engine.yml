name: Lattice Cube Autonomous Calibration Engine

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *'

jobs:
  validate-lattice-resonance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Set up Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Architecture Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy qiskit

      - name: Execute Mathematical Calibration And Pruning Validation
        run: |
          python -m unittest discover -s lattice_cube_engine/tests -p "test_*.py"

      - name: Assert Non-Chance Coherence Stability
        run: |
          python - <<'PY'
          from lattice_cube_engine.core.math_engine import LatticeMathEngine

          engine = LatticeMathEngine()
          assert abs(engine.phi - 1.61803398) < 1e-4, "Lattice synchronization failure."
          print("Coherent stabilization check passed.")
          PY
